name: Veille RSS (toutes les 6 h)

on:
  schedule:
    - cron: '15 5,11,17,23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run fetch-feeds
      - name: Commit des articles si changement
        run: |
          git config user.name 'devwatch-bot'
          git config user.email 'actions@github.com'
          git add public/data/articles.json
          git diff --cached --quiet || git commit -m 'chore: mise à jour de la veille RSS'
          git push
